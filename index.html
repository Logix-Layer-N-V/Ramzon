
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramzon N.V. — Admin System</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                primary: 'var(--brand-primary)',
                accent: 'var(--brand-accent)',
                'accent-light': 'var(--brand-accent-light)',
              }
            }
          }
        }
      }
    </script>
    <style>
        :root {
          /* Ramzon Wood Processing Company Colors */
          --brand-primary: #BE1E2D; /* Ramzon Red */
          --brand-accent: #1A1A1A;  /* Ramzon Black */
          --brand-accent-light: #FFF5F5; /* Light Red tint */
        }
        
        [data-theme='emerald'] {
          --brand-primary: #064e3b;
          --brand-accent: #10b981;
          --brand-accent-light: #f0fdf4;
        }

        [data-theme='indigo'] {
          --brand-primary: #312e81;
          --brand-accent: #6366f1;
          --brand-accent-light: #eef2ff;
        }

        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",

    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-router-dom": "https://esm.sh/react-router-dom@6.22.0?deps=react@18.2.0,react-dom@18.2.0",
    "lucide-react": "https://esm.sh/lucide-react@0.463.0?deps=react@18.2.0",
    "@google/genai": "https://esm.sh/@google/genai@1.40.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

</body>
</html>
